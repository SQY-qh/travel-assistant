name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_AMAP_API_KEY: ${{ secrets.VITE_AMAP_API_KEY }}
          VITE_AMAP_SECURITY_JS_CODE: ${{ secrets.VITE_AMAP_SECURITY_JS_CODE }}
          VITE_API_BASE_URL: https://travel-assistant-api-eight.vercel.app
        run: |
          if [[ "${{ github.event.repository.name }}" == *.github.io ]]; then
            VITE_BASE="/" npm run build
          else
            VITE_BASE="/${{ github.event.repository.name }}/" npm run build
          fi
          cp dist/index.html dist/404.html
          mkdir -p dist/plan dist/prepare
          cp dist/index.html dist/plan/index.html
          cp dist/index.html dist/prepare/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
